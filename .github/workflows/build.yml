name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Read version
        id: version
        run: |
          VERSION_CODE=$(grep -oP 'versionCode = \K\d+' app/build.gradle.kts)
          VERSION_NAME=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "APK_NAME=HermesApp-v${VERSION_NAME}.apk" >> $GITHUB_ENV
          echo "TAG_NAME=v${VERSION_NAME}" >> $GITHUB_ENV
          echo "Building version: $VERSION_NAME (code $VERSION_CODE)"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          SRC=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          cp "$SRC" "${{ env.APK_NAME }}"
          ls -lh "${{ env.APK_NAME }}"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Hermes App ${{ env.TAG_NAME }}
          body: |
            **Hermes Agent Android App** — Native WebView client for Hermes Web UI
            
            ### Features
            - First-launch URL prompt (configurable anytime in Settings)
            - Mobile / Desktop mode toggle (persistent UA switch)
            - Pull-to-refresh, file upload, TTS audio autoplay
            - Session isolation: changing server URL clears cache & cookies
            
            ### Install
            1. Download the APK below
            2. Allow "Install from unknown sources"
            3. Launch, enter your Hermes Web UI URL (e.g. `http://192.168.0.134:8648`)
          files: ${{ env.APK_NAME }}
          draft: false
          prerelease: false
          make_latest: "true"

      - name: Bump version for next build
        run: |
          NEW_CODE=$((VERSION_CODE + 1))
          NEW_NAME=$(python3 -c "v='${VERSION_NAME}'.split('.'); v[2]=str(int(v[2])+1); print('.'.join(v))")
          sed -i "s/versionCode = ${VERSION_CODE}/versionCode = ${NEW_CODE}/" app/build.gradle.kts
          sed -i "s/versionName = \"${VERSION_NAME}\"/versionName = \"${NEW_NAME}\"/" app/build.gradle.kts
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${NEW_NAME} [skip ci]"
          git push
