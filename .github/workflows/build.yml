name: Build, Self-Verify & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.VERSION_NAME }}
      version_code: ${{ steps.version.outputs.VERSION_CODE }}
      tag_name: ${{ steps.version.outputs.TAG_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Read version
        id: version
        run: |
          VERSION_CODE=$(grep -oP 'versionCode = \K\d+' app/build.gradle.kts)
          VERSION_NAME=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          echo "VERSION_CODE=$VERSION_CODE" | tee -a $GITHUB_OUTPUT $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" | tee -a $GITHUB_OUTPUT $GITHUB_ENV
          echo "TAG_NAME=v${VERSION_NAME}" | tee -a $GITHUB_OUTPUT $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare APK artifact
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          cp "$APK" "HermesApp-v${VERSION_NAME}.apk"
          ls -lh "HermesApp-v${VERSION_NAME}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: HermesApp-v${{ env.VERSION_NAME }}.apk
          retention-days: 7

  verify:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.verdict.outputs.passed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: .

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node.js (for mock Hermes server)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install mock server deps
        run: npm install --no-save socket.io@4

      - name: Start mock Hermes server
        run: |
          nohup node .github/scripts/mock_hermes.js 8648 > mock-hermes.log 2>&1 &
          sleep 3
          curl -fsS http://127.0.0.1:8648/health
          curl -fsS http://127.0.0.1:8648/socket.io/socket.io.js > /dev/null
          echo "Mock server ready (Socket.IO)"

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-x86_64-v2

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD snapshot cached"

      - name: Run emulator self-verification
        id: verify
        uses: reactivecircus/android-emulator-runner@v2
        env:
          TEST_URL: http://10.0.2.2:8648/?autotest=1
          MOCK_LOG: ${{ github.workspace }}/mock-hermes.log
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash .github/scripts/run_verify.sh

      - name: Determine verdict
        id: verdict
        run: |
          if [ -f verify-status ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "::error::Self-verification FAILED — Release skipped"
            echo "Status file content:"
            cat verify-status
          else
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "Self-verification PASSED"
          fi
          if [ -f verify-artifacts/verdict.txt ]; then
            echo "Verdict details:"
            cat verify-artifacts/verdict.txt
          fi

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-artifacts
          path: |
            verify-artifacts/
            mock-hermes.log
          retention-days: 14

  release:
    needs: [build, verify]
    if: needs.verify.outputs.passed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: .

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version_name }}
          name: Hermes App v${{ needs.build.outputs.version_name }}
          body: |
            **Hermes Agent Android App** v${{ needs.build.outputs.version_name }}

            Powered by **Mozilla GeckoView** (Firefox engine) — no longer depends on Android System WebView.
          files: HermesApp-v${{ needs.build.outputs.version_name }}.apk
          draft: false
          prerelease: false
          make_latest: "true"

      - name: Bump version for next build
        run: |
          VC=${{ needs.build.outputs.version_code }}
          VN=${{ needs.build.outputs.version_name }}
          NEW_CODE=$((VC + 1))
          NEW_NAME=$(python3 -c "v='${VN}'.split('.'); v[2]=str(int(v[2])+1); print('.'.join(v))")
          sed -i "s/versionCode = ${VC}/versionCode = ${NEW_CODE}/" app/build.gradle.kts
          sed -i "s/versionName = \"${VN}\"/versionName = \"${NEW_NAME}\"/" app/build.gradle.kts
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${NEW_NAME} [skip ci]"
          git push
